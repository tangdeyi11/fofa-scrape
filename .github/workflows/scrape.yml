name: Scrape FOFA Pages

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      MY_COOKIES: ${{ secrets.MY_COOKIES }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # 🚨 关键：完全干净环境（防止版本漂移）
      - name: Clean environment
        run: |
          rm -rf node_modules package-lock.json ~/.cache/puppeteer

      # 🚨 关键：锁定 Puppeteer 版本
      - name: Install dependencies
        run: |
          npm install puppeteer@22.8.2 --no-cache

      - name: Verify puppeteer version
        run: npm list puppeteer puppeteer-core

      - name: Run scraper
        run: npm start

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add iptv.txt iptvdl.txt
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S")
          git commit -m "Auto update fofa txt files on ${timestamp}" || echo "No changes to commit"
          git push
