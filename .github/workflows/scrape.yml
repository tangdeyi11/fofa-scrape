name: Scrape FOFA Pages
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      MY_COOKIES: ${{ secrets.MY_COOKIES }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-6 libxcomposite1 libxcursor1 libxdamage1 libxext6 \
            libxfixes3 libxi6 libxtst6 libnss3 libglib2.0-0 libgtk-3-0t64 \
            libasound2t64 libxrandr2 libpangocairo-1.0-0 libatk1.0-0 \
            libatk-bridge2.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 \
            libgdk-pixbuf2.0-0

      - name: Clean environment
        run: rm -rf node_modules package-lock.json

      - name: Install dependencies
        run: npm install puppeteer@24

      - name: Verify puppeteer version
        run: npm list puppeteer puppeteer-core

      - name: Run scraper
        run: npm start

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add iptv.txt iptvdl.txt
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S")
          git commit -m "Auto update fofa txt files on ${timestamp}" || echo "No changes to commit"
          git push
