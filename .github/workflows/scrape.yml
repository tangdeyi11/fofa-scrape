name: Scrape FOFA Pages

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时执行一次（UTC）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      MY_COOKIES: ${{ secrets.MY_COOKIES }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # ✅ 关键修复：强制使用 puppeteer（自带 Chromium）
      - name: Install dependencies (clean puppeteer)
        run: |
          rm -rf node_modules package-lock.json
          npm install puppeteer@22

      # （可选）避免缓存污染
      - name: Clean cache
        run: rm -rf ~/.cache/puppeteer

      - name: Run scraper
        run: npm start

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add iptv.txt iptvdl.txt
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S")
          git commit -m "Auto update fofa txt files on ${timestamp}" || echo "No changes to commit"
          git push
